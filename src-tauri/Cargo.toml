[package]
name = "proxidate-live"
version = "0.1.1"
edition = "2021"

[dependencies]
tauri = { version = "2.0", features = [] }
tauri-plugin-shell = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.36", features = ["full"] }
libp2p = { version = "0.54", features = ["tokio", "kad", "noise", "yamux", "tcp", "quic", "dns", "macros", "autonat", "relay"] }
sodiumoxide = "0.2.7"
zeroize = { version = "1.7", features = ["derive"] }
battery = "0.7"
rand = "0.8"
uuid = { version = "1.6", features = ["v4"] }
thiserror = "1.0"

[build-dependencies]
tauri-build = { version = "2.0", features = ["isolation"] }