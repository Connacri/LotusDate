name: Build APK

on:
  push:
    branches: [master]
    paths-ignore: ['README.md', '.gitignore']
  workflow_dispatch:
    inputs:
      version_bump: {description: 'Type', required: true, default: 'patch', type: choice, options: [patch, minor, major]}

permissions: {contents: write}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0, fetch-tags: true}

      - name: 🔢 Version
        id: version
        run: |
          git fetch --tags
          LAST_TAG=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -n1 || echo "v0.0.0")
          # ... (même logique bump que ton fichier)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with: {node-version: 20, cache: 'npm'}

      - uses: dtolnay/rust-toolchain@stable
        with: {targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android}

      - name: Install deps
        run: npm ci

      - name: Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - uses: android-actions/setup-android@v3
        with: {sdk-version: 34}

      - name: Build Tauri APK
        run: npm run tauri android build -- --release

      - name: Sign & Release
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: src-tauri/gen/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env: {GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: '**/*.apk'