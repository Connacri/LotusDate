name: Generate Keystore

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Alias de la clé'
        required: true
        default: 'lotusdate'
      keystore_password:
        description: 'Mot de passe keystore'
        required: true
      key_password:
        description: 'Mot de passe clé'
        required: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 🔑 Générer le keystore
        run: |
          keytool -genkey -v \
            -keystore lotusdate.jks \
            -alias "${{ github.event.inputs.alias }}" \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=LotusDate, OU=Mobile, O=Connacri, L=Oran, ST=Oran, C=DZ" \
            -storepass "${{ github.event.inputs.keystore_password }}" \
            -keypass "${{ github.event.inputs.key_password }}"

      - name: 📦 Convertir en base64
        id: b64
        run: |
          B64=$(base64 -w 0 lotusdate.jks)
          echo "signing_key=$B64" >> "$GITHUB_OUTPUT"

      - name: 🔐 Créer les secrets GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set SIGNING_KEY \
            --body "${{ steps.b64.outputs.signing_key }}" \
            --repo ${{ github.repository }}

          gh secret set ALIAS \
            --body "${{ github.event.inputs.alias }}" \
            --repo ${{ github.repository }}

          gh secret set KEYSTORE_PASSWORD \
            --body "${{ github.event.inputs.keystore_password }}" \
            --repo ${{ github.repository }}

          gh secret set KEY_PASSWORD \
            --body "${{ github.event.inputs.key_password }}" \
            --repo ${{ github.repository }}

          echo "✅ 4 secrets créés avec succès"
