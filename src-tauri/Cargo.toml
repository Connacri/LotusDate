[package]
name = "proxidate-live"
version = "0.1.1"
edition = "2021"

[lib]
name = "proxidate_live"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "proxidate-live"
path = "src/main.rs"

[dependencies]
tauri = { version = "2.0", features = [] }
tauri-plugin-shell = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.36", features = ["full"] }
libp2p = { version = "0.54", features = ["tokio", "kad", "noise", "yamux", "tcp", "quic", "dns", "macros", "autonat", "relay"] }
sodiumoxide = "0.2.7"
zeroize = { version = "1.7", features = ["derive"] }
rand = "0.8"
uuid = { version = "1.6", features = ["v4"] }
thiserror = "1.0"

[target.'cfg(not(target_os = "android"))'.dependencies]
battery = "0.7"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }