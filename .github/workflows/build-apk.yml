name: Build APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: versioning
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          echo "Current tag: $LATEST_TAG"
          # Simple version bump (0.1.0 -> 0.1.1)
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update versions in files
        run: |
          NEW_VERSION=${{ steps.versioning.outputs.new_version }}
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/g" package.json
          sed -i "s/\"version\": \".*\"/\"version\": \"$NEW_VERSION\"/g" src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/g" src-tauri/Cargo.toml

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install dependencies
        run: npm install

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - uses: android-actions/setup-android@v3
        with:
          sdk-version: '33'
          ndk-version: '25.2.9519653'
          build-tools-version: '33.0.0'

      - name: Build APK
        run: npm run tauri android build -- --release

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: src-tauri/gen/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          name: Release ${{ steps.versioning.outputs.new_version }}
          tag_name: v${{ steps.versioning.outputs.new_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: proxidate-live-signed.apk
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
